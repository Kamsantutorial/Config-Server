server:
  port: 8093
spring:
  application:
    name: "events"
  config:
    import:
      - "optional:configserver:http://localhost:8071"

  datasource:
    url: jdbc:postgresql://localhost:5440/eventsdb
    username: ${EVENTS_DB_USERNAME}
    password: ${EVENTS_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: auditSink
    stream:
      bindings:
        auditSink-in-0:
          destination: banking.audit.logs
          group: audit-service-group
      kafka:
        binder:
          brokers:
            - ${KAFKA_URL:localhost:9092}
common:
  logging:
    level: DEBUG
  jackson-snake-case:
    enabled: true

build:
  version: "1.0"

accounts:
  message: "Welcome to bunthoeurn events related docker APIs "
  contactDetails:
    name: "bunthoeurn - Developer"
    email: "bunthoeurn.com"
  onCallSupport:
    - (555) 555-1234
    - (555) 523-1345