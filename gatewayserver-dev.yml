server:
  port: 8090
spring:
  application:
    name: gatewayserver
  profiles:
    active: "dev"
  config:
    import: "optional:configserver:http://localhost:8071"
  sql:
    init:
      mode: always
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/gatewaydb
    username: ${GATWAY_DB_USERNAME}
    password: ${GATWAY_DB_PASSWORD}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:7080/realms/banking-platform/protocol/openid-connect/certs"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}


build:
  version: "1.0"

accounts:
  message: "Welcome to bunthoeurn gatewayserver related docker APIs "
  contactDetails:
    name: "bunthoeurn - Developer"
    email: "bunthoeurn.com"
  onCallSupport:
    - (555) 555-1234
    - (555) 523-1345