server:
  port: 8081

spring:
  application:
    name: "customers"

  datasource:
    url: jdbc:postgresql://localhost:5432/customersdb
#    username: ${CUSTOMERS_DB_USERNAME:customersdb}
#    password: ${CUSTOMERS_DB_PASSWORD:customersdb}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: customers-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 2000

  jpa:
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: updateUserId
    stream:
      bindings:
        updateUserId-in-0:
          destination: communication-sent
          group: ${spring.application.name}
        customerCreated-out-0:
          destination: send-communication
    vault:
      default-context: customers-db

accounts:
  message: "Welcome to bunthoeurn customers related docker APIs"
